<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-fixed-variant": "#004f57",
              "tertiary": "#00434a",
              "tertiary-fixed": "#95f1ff",
              "tertiary-fixed-dim": "#78d4e2",
              "surface-container-highest": "#dfe3e8",
              "surface-container-low": "#f1f4fa",
              "on-surface-variant": "#40484c",
              "secondary": "#516164",
              "on-surface": "#181c20",
              "on-primary-fixed-variant": "#004e61",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#ebeef4",
              "primary-fixed": "#b7eaff",
              "on-error": "#ffffff",
              "tertiary-container": "#005c66",
              "on-secondary": "#ffffff",
              "inverse-surface": "#2d3135",
              "on-primary-container": "#8ed1ea",
              "inverse-primary": "#8dd0e9",
              "inverse-on-surface": "#eef1f7",
              "primary-container": "#005b71",
              "on-secondary-container": "#57676a",
              "on-background": "#181c20",
              "secondary-fixed": "#d4e6e9",
              "primary": "#004253",
              "surface-bright": "#f7f9ff",
              "secondary-container": "#d4e6e9",
              "on-error-container": "#93000a",
              "surface-variant": "#dfe3e8",
              "on-primary": "#ffffff",
              "secondary-fixed-dim": "#b9cacd",
              "outline": "#70787d",
              "surface": "#f7f9ff",
              "on-tertiary-container": "#79d5e3",
              "background": "#f7f9ff",
              "surface-tint": "#19667d",
              "surface-dim": "#d7dae0",
              "on-secondary-fixed-variant": "#3a494c",
              "primary-fixed-dim": "#8dd0e9",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "outline-variant": "#bfc8cc",
              "on-secondary-fixed": "#0e1e21",
              "surface-container-high": "#e5e8ee",
              "on-primary-fixed": "#001f28",
              "error": "#ba1a1a",
              "on-tertiary-fixed": "#001f24"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .milled-gradient {
            background: linear-gradient(135deg, #004253 0%, #005b71 100%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Abstract Background Decor -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[60%] rounded-full bg-primary-fixed/20 blur-[120px]"></div>
<div class="absolute bottom-[0%] right-[0%] w-[50%] h-[50%] rounded-full bg-secondary-fixed/30 blur-[100px]"></div>
<div class="absolute top-[20%] right-[10%] w-[30%] h-[30%] rounded-full bg-tertiary-fixed/10 blur-[80px]"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-md px-6">
<!-- Login Card -->
<div class="glass-card rounded-xl shadow-[0px_12px_32px_rgba(24,28,32,0.06)] p-10 flex flex-col items-center">
<!-- Brand Logo -->
<div class="mb-10 text-center">
<h1 class="font-headline font-extrabold text-4xl tracking-tight text-primary">Frisol</h1>
<p class="text-on-surface-variant font-label text-xs uppercase tracking-[0.2em] mt-2 font-medium opacity-70">B2B Diagnostic Platform</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-6" onsubmit="return false;">
<!-- Email Input Group -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-primary uppercase tracking-wider ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border-b-2 border-outline-variant/15 focus:border-primary focus:ring-0 transition-all font-body text-sm rounded-lg placeholder:text-outline/50" id="email" placeholder="nombre@empresa.com" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="font-label text-xs font-semibold text-primary uppercase tracking-wider" for="password">Password</label>
<a class="text-[10px] font-bold text-primary-container hover:underline tracking-tight" href="#">FORGOT?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-3.5 bg-surface-container-lowest border-b-2 border-outline-variant/15 focus:border-primary focus:ring-0 transition-all font-body text-sm rounded-lg placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action Button (Disabled State) -->
<div class="pt-4">
<button class="w-full milled-gradient text-on-primary py-4 rounded-xl font-headline font-bold text-sm tracking-wide flex items-center justify-center gap-3 opacity-50 cursor-not-allowed shadow-lg" disabled="">
<span class="material-symbols-outlined text-lg" data-icon="lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock</span>
                        Iniciar Sesión
                    </button>
</div>
</form>
<!-- Footer Meta -->
<div class="mt-8 pt-8 w-full border-t border-outline-variant/15 flex flex-col items-center gap-4">
<div class="flex items-center gap-2 text-outline text-[11px] font-medium tracking-tight">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
                    SECURE AES-256 ENCRYPTED ENVIRONMENT
                </div>
<div class="flex gap-6">
<a class="text-on-surface-variant text-[11px] hover:text-primary transition-colors font-semibold" href="#">Privacy Policy</a>
<a class="text-on-surface-variant text-[11px] hover:text-primary transition-colors font-semibold" href="#">Terms of Service</a>
</div>
</div>
</div>
<!-- System Version Anchor -->
<p class="mt-8 text-center font-label text-[10px] text-outline tracking-[0.3em] font-bold opacity-40">
            FRISOL SYSTEM V1.4.0-STABLE
        </p>
</main>
<!-- Background Image / Texture -->
<div class="absolute inset-0 -z-10 opacity-[0.03] mix-blend-overlay pointer-events-none">
<img class="w-full h-full object-cover" data-alt="abstract architectural grid with microchip patterns and futuristic digital geometry in monochromatic soft teal tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBbH7gm4hSWZnNaDPeu90tVlb-NENBwH7_d9iBptbUouA6LUIC3ocK-KGPYEVmdeevyUtlH2ZyMqDC8wRUPngnmcYzmalwSUBe-zl5gn4KS9VoQ0ApaovctjS-ZlyTldlAU7vmaAINpefzajlCCBe1zYMrB6M5AhCBtMuxkPQ53Bw2HEqP-gqCBSYXgbR5-rGAP-Dj2tT6sYgiXnorGMvXbyEBBKLz7_kRKYHyycelircCymv3iIOoULXJNjayKEuqFFsQXuPtcED8"/>
</div>
</body></html>
